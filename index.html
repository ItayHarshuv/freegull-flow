
<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>FreeGull Flow | מערכת ניהול מועדון גלישה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontSize: {
              'xs': '0.75rem',    /* 12px */
              'sm': '0.875rem',   /* 14px */
              'base': '1rem',     /* 16px - Standard Base */
              'lg': '1.125rem',   /* 18px */
              'xl': '1.25rem',    /* 20px */
              '2xl': '1.5rem',    /* 24px */
              '3xl': '1.875rem',  /* 30px */
              '4xl': '2.25rem',   /* 36px */
              '5xl': '3rem',      /* 48px */
            },
            colors: {
              brand: {
                DEFAULT: '#00A9B7',
                dark: '#007A85',
                light: '#E6F6F7',
                ocean: '#00425A'
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Assistant', sans-serif;
        background-color: #f0f7f8;
        font-size: 1rem; 
        line-height: 1.5;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: contain;
        color: #1e293b;
      }
      
      * {
        word-wrap: break-word;
        overflow-wrap: break-word;
      }

      .brand-gradient {
        background: linear-gradient(135deg, #00A9B7 0%, #00425A 100%);
      }
      
      .animate-fade-in { animation: fadeIn 0.3s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #00A9B7; border-radius: 10px; }

      .safe-bottom {
        padding-bottom: env(safe-area-inset-bottom);
      }
      
      button { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
      button:active { transform: scale(0.96); }

      /* Prevent automatic zoom on iOS while maintaining readability */
      input, select, textarea {
        font-size: 16px !important;
        max-width: 100%;
      }
      
      .grid {
        direction: rtl;
      }

      /* Custom mobile table wrapper indicator */
      .scroll-hint {
        position: relative;
      }
      .scroll-hint::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 20px;
        background: linear-gradient(to right, rgba(0,0,0,0.05), transparent);
        pointer-events: none;
        opacity: 0;
      }
      @media (max-width: 768px) {
        .scroll-hint::after { opacity: 1; }
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
